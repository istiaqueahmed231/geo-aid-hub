<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Geo-Aid Hub | Map View</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <!-- Leaflet CSS and JS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>

    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "inverse-on-surface": "#2f3034",
                        "on-secondary": "#003909",
                        "background": "#111316",
                        "secondary": "#88d982",
                        "outline": "#ad897e",
                        "surface-container-high": "#282a2d",
                        "surface-container": "#1e2023",
                        "error-container": "#93000a",
                        "on-error": "#690005",
                        "surface": "#111316",
                        "surface-bright": "#37393d",
                        "surface-variant": "#333538",
                        "inverse-surface": "#e2e2e6",
                        "on-surface-variant": "#e6beb2",
                        "surface-container-low": "#1a1c1f",
                        "primary": "#ffb4a4",
                        "error": "#ffb4ab",
                        "surface-dim": "#111316",
                        "on-background": "#e2e2e6",
                        "surface-container-highest": "#333538",
                        "on-surface": "#e2e2e6",
                        "tertiary": "#55d7ed",
                        "primary-container": "#fe5733"
                    },
                    fontFamily: {
                        "headline": ["Manrope"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    },
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        /* Leaflet tile override for dark mode aesthetic */
        .leaflet-layer,
        .leaflet-control-zoom-in,
        .leaflet-control-zoom-out,
        .leaflet-control-attribution {
            filter: invert(100%) hue-rotate(180deg) brightness(95%) contrast(90%);
        }
    </style>
</head>
<body class="bg-background text-on-surface font-body selection:bg-primary/30 selection:text-primary min-h-screen flex hover:text-zinc-200">
    <!-- SideNavBar -->
    <aside class="h-screen w-64 fixed left-0 top-0 z-40 bg-zinc-900 font-['Inter'] text-sm font-medium flex flex-col py-8 gap-4">
        <div class="px-6 mb-4">
            <h1 class="text-lg font-black text-orange-500 tracking-tighter">Geo-Aid Central</h1>
            <p class="text-xs text-zinc-500">Regional Command</p>
        </div>
        <nav class="flex-1 space-y-1">
            <a class="flex items-center gap-3 text-zinc-500 px-4 py-3 hover:text-zinc-200 hover:bg-zinc-800 transition-colors group" href="index.html">
                <span class="material-symbols-outlined" data-icon="dashboard">dashboard</span>
                <span>Dashboard</span>
            </a>
            <a class="flex items-center gap-3 bg-zinc-800/80 text-orange-400 rounded-lg px-4 py-3 ml-2 mr-2 group" href="map-view.html">
                <span class="material-symbols-outlined" data-icon="map">map</span>
                <span>Map View</span>
            </a>
            <a class="flex items-center gap-3 text-zinc-500 px-4 py-3 hover:text-zinc-200 hover:bg-zinc-800 transition-colors group" href="resource-log.html">
                <span class="material-symbols-outlined" data-icon="inventory_2">inventory_2</span>
                <span>Resource Log</span>
            </a>
            <a class="flex items-center gap-3 text-zinc-500 px-4 py-3 hover:text-zinc-200 hover:bg-zinc-800 transition-colors group" href="#">
                <span class="material-symbols-outlined" data-icon="group">group</span>
                <span>Volunteer Fleet</span>
            </a>
            <a class="flex items-center gap-3 text-zinc-500 px-4 py-3 hover:text-zinc-200 hover:bg-zinc-800 transition-colors group" href="#">
                <span class="material-symbols-outlined" data-icon="history">history</span>
                <span>Archive</span>
            </a>
        </nav>
        <div class="px-4 mt-auto space-y-1 pt-6 border-t border-zinc-800/30">
            <button class="w-full bg-primary-container text-white py-3 rounded-xl font-bold mb-4 shadow-lg shadow-primary-container/20 active:scale-95 duration-150">
                New SOS Report
            </button>
        </div>
    </aside>

    <!-- Main Content Canvas -->
    <main class="flex-1 ml-64 min-h-screen relative flex flex-col">
        <!-- TopNavBar -->
        <header class="fixed top-0 left-64 right-0 z-50 bg-zinc-950/80 backdrop-blur-xl shadow-2xl shadow-black/50 font-['Manrope'] antialiased tracking-tight flex justify-between items-center px-8 h-20">
            <div class="flex items-center gap-8">
                <span class="text-2xl font-bold tracking-tighter text-zinc-100">Live Map View</span>
            </div>
        </header>

        <!-- Map Section -->
        <div class="mt-20 flex-1 p-6 flex flex-col h-[calc(100vh-5rem)]">
            <div id="map" class="w-full h-full rounded-2xl shadow-2xl border border-white/10 z-0" style="min-height: 600px;"></div>
        </div>
    </main>

    <script>
        // Init Leaflet map centered on Bangladesh
        const map = L.map('map').setView([23.6850, 90.3563], 7);

        // Add OpenStreetMap tiles
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // Fetch shelter data from DB and plot them
        async function loadShelterMap() {
            try {
                const response = await fetch('/api/shelters');
                const shelters = await response.json();
                
                // Keep track of locations to potentially fit bounds
                const bounds = [];

                shelters.forEach(shelter => {
                    if (shelter.Latitude && shelter.Longitude) {
                        const lat = parseFloat(shelter.Latitude);
                        const lng = parseFloat(shelter.Longitude);
                        
                        // Pick a color based on status
                        let colorStr = 'blue';
                        if (shelter.Status === 'Full') colorStr = 'red';
                        if (shelter.Status === 'Closed') colorStr = 'gray';

                        // Custom pin marker via Leaflet DIV Icon
                        const markerHtml = `<div style="
                            width: 24px; 
                            height: 24px; 
                            background: ${colorStr}; 
                            border-radius: 50%;
                            border: 3px solid white;
                            box-shadow: 0 0 10px rgba(0,0,0,0.5);
                        "></div>`;

                        const customIcon = L.divIcon({
                            className: 'custom-icon',
                            html: markerHtml,
                            iconSize: [24, 24],
                            iconAnchor: [12, 12]
                        });

                        const marker = L.marker([lat, lng], { icon: customIcon }).addTo(map);

                        const popupContent = `
                            <div style="font-family: 'Inter', sans-serif; color: #111;">
                                <h3 style="margin: 0; font-weight: bold; font-size: 14px;">${shelter.ShelterName}</h3>
                                <p style="margin: 4px 0 0; font-size: 12px; color: #666;">${shelter.AreaName} (${shelter.ZoneType})</p>
                                <div style="margin-top: 8px; border-top: 1px solid #ddd; padding-top: 8px;">
                                    <p style="margin: 2px 0; font-size: 12px;"><strong>Capacity:</strong> ${shelter.CurrentOccupancy} / ${shelter.TotalCapacity}</p>
                                    <p style="margin: 2px 0; font-size: 12px;"><strong>Status:</strong> ${shelter.Status}</p>
                                    <p style="margin: 2px 0; font-size: 10px; color: #999;">Lat: ${lat}, Lng: ${lng}</p>
                                </div>
                            </div>
                        `;

                        marker.bindPopup(popupContent);
                        
                        bounds.push([lat, lng]);
                    }
                });

                // Auto-zoom to fit all shelters if we found any
                if (bounds.length > 0) {
                    map.fitBounds(bounds, { padding: [50, 50] });
                }

            } catch (err) {
                console.error("Failed to load map data from backend:", err);
            }
        }

        loadShelterMap();
    </script>
</body>
</html>
