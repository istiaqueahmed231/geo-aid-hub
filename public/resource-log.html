<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Geo-Aid Hub | Resource Log</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "inverse-on-surface": "#2f3034",
                        "on-secondary": "#003909",
                        "background": "#111316",
                        "secondary": "#88d982",
                        "outline": "#ad897e",
                        "surface-container-high": "#282a2d",
                        "surface-container": "#1e2023",
                        "error-container": "#93000a",
                        "on-error": "#690005",
                        "surface": "#111316",
                        "surface-bright": "#37393d",
                        "surface-variant": "#333538",
                        "inverse-surface": "#e2e2e6",
                        "on-surface-variant": "#e6beb2",
                        "surface-container-low": "#1a1c1f",
                        "primary": "#ffb4a4",
                        "error": "#ffb4ab",
                        "surface-dim": "#111316",
                        "on-background": "#e2e2e6",
                        "surface-container-highest": "#333538",
                        "on-surface": "#e2e2e6",
                        "tertiary": "#55d7ed",
                        "primary-container": "#fe5733"
                    },
                    fontFamily: {
                        "headline": ["Manrope"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    },
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #333538; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #5c4037; }
    </style>
</head>
<body class="bg-background text-on-surface font-body selection:bg-primary/30 selection:text-primary min-h-screen flex">
    <!-- SideNavBar -->
    <aside class="h-screen w-64 fixed left-0 top-0 z-40 bg-zinc-900 font-['Inter'] text-sm font-medium flex flex-col py-8 gap-4">
        <div class="px-6 mb-4">
            <h1 class="text-lg font-black text-orange-500 tracking-tighter">Geo-Aid Central</h1>
            <p class="text-xs text-zinc-500">Regional Command</p>
        </div>
        <nav class="flex-1 space-y-1">
            <a class="flex items-center gap-3 text-zinc-500 px-4 py-3 hover:text-zinc-200 hover:bg-zinc-800 transition-colors group" href="index.html">
                <span class="material-symbols-outlined" data-icon="dashboard">dashboard</span>
                <span>Dashboard</span>
            </a>
            <a class="flex items-center gap-3 text-zinc-500 px-4 py-3 hover:text-zinc-200 hover:bg-zinc-800 transition-colors group" href="map-view.html">
                <span class="material-symbols-outlined" data-icon="map">map</span>
                <span>Map View</span>
            </a>
            <a class="flex items-center gap-3 bg-zinc-800/80 text-orange-400 rounded-lg px-4 py-3 ml-2 mr-2 group" href="resource-log.html">
                <span class="material-symbols-outlined" data-icon="inventory_2">inventory_2</span>
                <span>Resource Log</span>
            </a>
            <a class="flex items-center gap-3 text-zinc-500 px-4 py-3 hover:text-zinc-200 hover:bg-zinc-800 transition-colors group" href="#">
                <span class="material-symbols-outlined" data-icon="group">group</span>
                <span>Volunteer Fleet</span>
            </a>
            <a class="flex items-center gap-3 text-zinc-500 px-4 py-3 hover:text-zinc-200 hover:bg-zinc-800 transition-colors group" href="#">
                <span class="material-symbols-outlined" data-icon="history">history</span>
                <span>Archive</span>
            </a>
        </nav>
        <div class="px-4 mt-auto space-y-1 pt-6 border-t border-zinc-800/30">
            <button class="w-full bg-primary-container text-white py-3 rounded-xl font-bold mb-4 shadow-lg shadow-primary-container/20 active:scale-95 duration-150">
                New SOS Report
            </button>
            <a class="flex items-center gap-3 text-zinc-500 px-4 py-3 hover:text-zinc-200" href="#">
                <span class="material-symbols-outlined" data-icon="help">help</span>
                <span>Support</span>
            </a>
            <a class="flex items-center gap-3 text-zinc-500 px-4 py-3 hover:text-zinc-200" href="#">
                <span class="material-symbols-outlined" data-icon="logout">logout</span>
                <span>Logout</span>
            </a>
        </div>
    </aside>

    <!-- Main Content Canvas -->
    <main class="flex-1 ml-64 min-h-screen relative">
        <!-- TopNavBar -->
        <header class="fixed top-0 left-64 right-0 z-50 bg-zinc-950/80 backdrop-blur-xl shadow-2xl shadow-black/50 font-['Manrope'] antialiased tracking-tight flex justify-between items-center px-8 h-20">
            <div class="flex items-center gap-8">
                <span class="text-2xl font-bold tracking-tighter text-zinc-100">Geo-Aid Hub</span>
                <div class="flex gap-6 items-center">
                    <div class="flex items-center gap-2">
                        <span class="w-2 h-2 rounded-full bg-error animate-pulse"></span>
                        <span class="text-error font-bold">Active SOS: 142</span>
                    </div>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <div class="flex items-center gap-2">
                    <button class="p-2 text-zinc-400 hover:bg-zinc-800/50 rounded-full transition-all duration-300 active:scale-95">
                        <span class="material-symbols-outlined" data-icon="notifications">notifications</span>
                    </button>
                    <button class="p-2 text-zinc-400 hover:bg-zinc-800/50 rounded-full transition-all duration-300 active:scale-95">
                        <span class="material-symbols-outlined" data-icon="settings">settings</span>
                    </button>
                    <div class="h-10 w-10 rounded-full bg-zinc-700 ml-2 border-2 border-zinc-800"></div>
                </div>
            </div>
        </header>

        <!-- Resource Log Section -->
        <div class="pt-24 px-8 pb-8 flex flex-col h-full">
            <div class="flex justify-between items-end mb-6">
                <h2 class="font-headline text-3xl font-bold text-on-surface">Resource Log</h2>
                <div class="flex gap-4">
                    <button class="bg-surface-container-high px-4 py-2 rounded-lg text-sm text-on-surface font-medium hover:bg-surface-container-highest transition">
                        Filter
                    </button>
                    <button class="bg-primary-container px-4 py-2 rounded-lg text-sm text-white font-bold hover:bg-primary-container/90 transition shadow-lg shadow-primary/20">
                        Add Resource
                    </button>
                </div>
            </div>
            
            <div class="bg-surface-container rounded-2xl overflow-hidden shadow-xl border border-white/5 flex-1 flex flex-col">
                <div class="overflow-x-auto flex-1">
                    <table class="w-full text-left text-sm whitespace-nowrap">
                        <thead class="uppercase tracking-wider text-xs font-bold text-on-surface-variant bg-surface-container-low border-b border-white/10 sticky top-0">
                            <tr>
                                <th scope="col" class="px-6 py-4">ID</th>
                                <th scope="col" class="px-6 py-4">Category Name</th>
                                <th scope="col" class="px-6 py-4">Unit</th>
                                <th scope="col" class="px-6 py-4">Current Location</th>
                                <th scope="col" class="px-6 py-4">Quantity</th>
                                <th scope="col" class="px-6 py-4 text-center">Status</th>
                            </tr>
                        </thead>
                        <tbody id="resource-table-body" class="divide-y divide-white/5">
                            <!-- Rows injected by JavaScript -->
                            <tr class="animate-pulse">
                                <td colspan="6" class="px-6 py-8 text-center text-zinc-500">Loading resources...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script>
        async function loadResources() {
            try {
                const response = await fetch('/api/resources');
                const resources = await response.json();
                
                const tableBody = document.getElementById('resource-table-body');
                
                if (!tableBody) {
                    console.error("Could not find the table body container!");
                    return;
                }

                tableBody.innerHTML = ''; 

                if (resources.length === 0) {
                    tableBody.innerHTML = '<tr><td colspan="6" class="px-6 py-8 text-center text-zinc-500">No resources available.</td></tr>';
                    return;
                }

                resources.forEach(res => {
                    const row = document.createElement('tr');
                    row.className = 'hover:bg-surface-container-highest transition-colors group';
                    
                    let statusColor = "bg-green-500/10 text-green-400 border border-green-500/20";
                    if(res.Status === 'Reserved') {
                        statusColor = "bg-orange-500/10 text-orange-400 border border-orange-500/20";
                    } else if(res.Status === 'In-Transit') {
                        statusColor = "bg-blue-500/10 text-blue-400 border border-blue-500/20";
                    } else if(res.Status === 'Depleted' || res.Quantity === 0) {
                        statusColor = "bg-red-500/10 text-red-400 border border-red-500/20";
                    }

                    row.innerHTML = `
                        <td class="px-6 py-4 font-mono text-zinc-500 group-hover:text-zinc-300">#${res.ResourceID}</td>
                        <td class="px-6 py-4 font-medium text-on-surface">${res.CategoryName}</td>
                        <td class="px-6 py-4 text-zinc-400">${res.UnitOfMeasure || '-'}</td>
                        <td class="px-6 py-4 text-zinc-300 flex items-center gap-2">
                            <span class="material-symbols-outlined text-[16px] text-zinc-500">location_on</span>
                            ${res.CurrentLocation || 'Unknown'}
                        </td>
                        <td class="px-6 py-4 font-bold text-on-surface">${res.Quantity}</td>
                        <td class="px-6 py-4 text-center">
                            <span class="text-[10px] uppercase font-bold px-2 py-1 rounded ${statusColor}">
                                ${res.Status}
                            </span>
                        </td>
                    `;
                    
                    tableBody.appendChild(row);
                });
            } catch (error) {
                console.error("Failed to load resources:", error);
                const tableBody = document.getElementById('resource-table-body');
                if (tableBody) {
                    tableBody.innerHTML = '<tr><td colspan="6" class="px-6 py-8 text-center text-error">Failed to load data. Make sure the server is running.</td></tr>';
                }
            }
        }

        loadResources();
    </script>
</body>
</html>
