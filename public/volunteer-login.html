<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Geo-Aid Hub | Volunteer Login</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <script type="module" src="./firebase-config.js"></script>
  
  <!-- Inline Volunteer Auth Logic to bypass Admin check -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";
    import { firebaseConfig } from "./firebase-config.js";

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    window.loginVolunteer = function() {
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;
        if (!email || !password) return alert("Enter email and password");
        
        signInWithEmailAndPassword(auth, email, password)
            .then(() => {
                window.location.href = "volunteer-map.html";
            })
            .catch(err => {
                alert("Login Failed: " + err.message);
            });
    };
  </script>

  <link rel="stylesheet" href="./app.css"/>
  <script id="tailwind-config">
      tailwind.config = {
          darkMode: "class",
          theme: {
              extend: {
                  colors: {
                      "background": "var(--bg)",
                      "surface": "var(--bg-panel)",
                      "primary": "var(--green)",
                      "on-surface": "var(--text)",
                      "on-surface-variant": "var(--text-dim)",
                      "outline": "var(--border)"
                  },
                  fontFamily: { "headline": ["Manrope"], "body": ["Inter"] },
              },
          },
      }
  </script>
</head>
<body class="bg-background text-on-surface font-body min-h-screen flex items-center justify-center relative py-12 overflow-hidden">
    <div class="relative z-10 w-full max-w-md p-8 bg-surface/40 backdrop-blur-2xl border border-outline rounded-3xl shadow-2xl">
        <div class="mb-8 text-center">
            <h2 class="text-4xl font-headline font-black text-on-surface tracking-tight mb-2">Volunteer Portal</h2>
            <p class="text-on-surface-variant font-medium">Log in to view live emergency maps.</p>
        </div>

        <form onsubmit="event.preventDefault(); window.loginVolunteer();" class="space-y-6">
            <div class="space-y-1.5">
                <label for="email" class="block text-xs font-bold text-on-surface-variant uppercase tracking-widest ml-1">Email</label>
                <input type="email" id="email" required class="w-full bg-surface/50 border border-outline text-on-surface rounded-2xl px-4 py-4 focus:outline-none focus:border-primary" placeholder="you@volunteer.com" />
            </div>

            <div class="space-y-1.5">
                <label for="password" class="block text-xs font-bold text-on-surface-variant uppercase tracking-widest ml-1">Password</label>
                <input type="password" id="password" required class="w-full bg-surface/50 border border-outline text-on-surface rounded-2xl px-4 py-4 focus:outline-none focus:border-primary" placeholder="••••••••" />
            </div>

            <div class="pt-4">
                <button type="submit" class="w-full py-4 px-4 bg-primary text-black font-bold rounded-2xl hover:brightness-110 transition-all shadow-lg">
                    Login to Map View
                </button>
            </div>
            
            <div class="text-center mt-2">
                <a href="welcome.html" class="text-xs text-on-surface-variant hover:text-white">← Back to Menu</a>
            </div>
        </form>
    </div>
</body>
</html>
