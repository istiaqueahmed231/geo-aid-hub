<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Geo-Aid Hub | Welcome</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <!-- Firebase Auth Logic is included here solely to redirect if already logged in -->
  <script type="module" src="./firebase-config.js"></script>
  <script type="module" src="./auth.js"></script>
  <link rel="stylesheet" href="./app.css"/>
  <script id="tailwind-config">
      tailwind.config = {
          darkMode: "class",
          theme: {
              extend: {
                  colors: {
                      "background": "var(--bg)",
                      "surface": "var(--bg-panel)",
                      "primary": "var(--orange)",
                      "secondary": "var(--green)",
                      "error": "var(--red)",
                      "outline": "var(--border)",
                      "surface-container": "var(--surface)",
                      "on-surface": "var(--text)",
                      "on-surface-variant": "var(--text-dim)",
                  },
                  fontFamily: {
                      "headline": ["Manrope"],
                      "body": ["Inter"],
                  },
              },
          },
      }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
</head>
<body class="bg-background text-on-surface font-body min-h-screen flex items-center justify-center relative overflow-hidden">
    <!-- Ambient Background Effect -->
    <div class="absolute inset-0 pointer-events-none">
        <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-primary/10 blur-[120px] rounded-full"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-secondary/10 blur-[120px] rounded-full"></div>
    </div>

    <!-- Top Left Logo -->
    <div class="absolute top-6 left-6 md:left-8 flex items-center gap-3 select-none z-20">
        <div class="inline-flex items-center justify-center w-10 h-10 rounded-xl bg-surface/80 backdrop-blur border border-outline shadow-lg">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-primary" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 104 0 2 2 0 012-2h1.064M15 20.488V18a2 2 0 012-2h3.064M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
        </div>
        <div>
            <h1 class="text-lg font-headline font-black text-on-surface tracking-tighter leading-none">Geo-Aid <span class="text-primary font-bold">HUB</span></h1>
        </div>
    </div>

    <!-- Theme Toggle in Top Right -->
    <div class="absolute top-6 right-6 md:right-8 flex items-center gap-2 z-20">
        <button id="theme-toggle-btn" class="icon-btn">
            <span id="theme-toggle-icon" class="material-symbols-outlined">light_mode</span>
        </button>
    </div>

    <div class="relative z-10 w-full max-w-md p-8 md:p-10 bg-surface/40 backdrop-blur-2xl border border-outline rounded-3xl shadow-2xl space-y-8 animate-fade-in-up">
        <!-- Header -->
        <div class="text-center space-y-3">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-surface/50 border border-outline mb-2 shadow-inner">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-primary" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" />
                </svg>
            </div>
            <h1 class="text-4xl font-headline font-black text-on-surface tracking-tight">Geo-Aid Hub</h1>
            <p class="text-on-surface-variant font-medium">Join our network of volunteers and coordinate disaster relief efforts efficiently.</p>
        </div>

        <!-- Actions -->
        <div class="space-y-4 pt-4">
            <a href="login.html" class="flex items-center justify-center w-full py-4 px-4 bg-primary text-white hover:brightness-110 font-bold rounded-2xl transition-all duration-300 transform active:scale-[0.98] shadow-lg shadow-primary/20">
                Sign In to Portal
            </a>
            
            <div class="relative flex items-center py-2">
                <div class="flex-grow border-t border-outline"></div>
                <span class="flex-shrink-0 mx-4 text-xs text-on-surface-variant uppercase font-bold tracking-widest">or</span>
                <div class="flex-grow border-t border-outline"></div>
            </div>

            <a href="signup.html" class="flex items-center justify-center w-full py-4 px-4 bg-surface hover:bg-surface/60 text-on-surface font-bold rounded-2xl border border-outline transition-all duration-300 transform active:scale-[0.98]">
                Create an Account
            </a>
        </div>

        <!-- Footer -->
        <div class="text-center pt-4 border-t border-outline">
            <p class="text-xs text-on-surface-variant font-medium">By logging in, you agree to our Terms of Service & Privacy Policy.</p>
        </div>
    </div>

    <style>
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in-up {
            animation: fadeInUp 0.8s cubic-bezier(0.2, 1, 0.2, 1) forwards;
        }
    </style>
    <script src="./theme.js"></script>
</body>
</html>
