<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Volunteer Login</title>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script type="module" src="./firebase-config.js"></script>
  <script type="module" src="./auth.js"></script>
  <style>
    body {font-family: Inter, sans-serif; background: #111316; color: #e2e2e6; display:flex; justify-content:center; align-items:center; height:100vh;}
    .card {background:#1e2023; padding:2rem; border-radius:0.5rem; box-shadow:0 4px 6px rgba(0,0,0,0.2); width:320px;}
    input {width:100%; padding:0.5rem; margin:0.5rem 0; border:1px solid #333; border-radius:0.25rem; background:#282a2d; color:#e2e2e6;}
    button {width:100%; padding:0.75rem; background:#ffb4a4; color:#000; border:none; border-radius:0.25rem; font-weight:bold; cursor:pointer;}
    a {color:#88d982; display:block; text-align:center; margin-top:0.5rem;}
  </style>
</head>
<body>
  <div class="card">
    <h2>Volunteer Login</h2>
    <input type="email" id="email" placeholder="Email" />
    <input type="password" id="password" placeholder="Password" />
    <button onclick="login()">Login</button>
    <a href="signup.html">Create an account</a>
  </div>
</body>
</html>
