<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Geo-Aid Hub | Login</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <script type="module" src="./firebase-config.js"></script>
  <script type="module" src="./auth.js"></script>
    <link rel="stylesheet" href="./app.css"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "background": "var(--bg)",
                        "surface": "var(--bg-panel)",
                        "primary": "var(--orange)",
                        "secondary": "var(--green)",
                        "error": "var(--red)",
                        "outline": "var(--border)",
                        "surface-container": "var(--surface)",
                        "on-surface": "var(--text)",
                        "on-surface-variant": "var(--text-dim)",
                    },
                    fontFamily: {
                        "headline": ["Manrope"],
                        "body": ["Inter"],
                    },
                },
            },
        }
    </script>
</head>
<body class="bg-background text-on-surface font-body min-h-screen flex items-center justify-center relative py-12 overflow-hidden">
    <!-- Ambient Background Effect -->
    <div class="absolute inset-0 pointer-events-none">
        <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-primary/5 blur-[120px] rounded-full"></div>
    </div>

    <!-- toast notification element -->
    <div id="toast" style="display:none;" class="fixed bottom-4 right-4 px-4 py-2 rounded shadow-lg z-50"></div>
    
    <script>
        window.showToast = function(message, isError = false) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `fixed bottom-6 right-6 px-5 py-3 rounded-xl shadow-2xl z-50 transition-all duration-300 font-bold border ${isError ? 'bg-red-900/80 text-white border-red-500/30 backdrop-blur' : 'bg-green-900/80 text-white border-green-500/30 backdrop-blur'}`;
            toast.style.display = 'block';
            toast.style.transform = 'translateY(0)';
            toast.style.opacity = '1';
            
            setTimeout(() => { 
                toast.style.transform = 'translateY(20px)';
                toast.style.opacity = '0';
                setTimeout(() => { toast.style.display = 'none'; }, 300);
            }, 4000);
        }
    </script>

    <!-- Top Left Logo -->
    <div class="absolute top-6 left-6 md:left-8 flex items-center gap-3 select-none z-20">
        <div class="inline-flex items-center justify-center w-10 h-10 rounded-xl bg-surface/80 backdrop-blur border border-outline shadow-lg cursor-pointer" onclick="location.href='welcome.html'">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-primary" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 104 0 2 2 0 012-2h1.064M15 20.488V18a2 2 0 012-2h3.064M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
        </div>
        <div>
            <h1 class="text-lg font-headline font-black text-on-surface tracking-tighter leading-none">Geo-Aid <span class="text-primary font-bold">HUB</span></h1>
        </div>
    </div>

    <!-- Theme Toggle in Top Right -->
    <div class="absolute top-6 right-6 md:right-8 flex items-center gap-2 z-20">
        <button id="theme-toggle-btn" class="icon-btn">
            <span id="theme-toggle-icon" class="material-symbols-outlined">light_mode</span>
        </button>
    </div>

    <div class="relative z-10 w-full max-w-md p-8 md:p-10 bg-surface/40 backdrop-blur-2xl border border-outline rounded-3xl shadow-2xl animate-fade-in-up">
        
        <div class="mb-8 text-center">
            <h2 class="text-4xl font-headline font-black text-on-surface tracking-tight mb-2">Welcome Back</h2>
            <p class="text-on-surface-variant font-medium">Log in to coordinate disaster relief efforts.</p>
        </div>

        <form onsubmit="event.preventDefault(); if(window.login) { window.login(); } else { alert('Error: Authentication script failed to load.'); }" class="space-y-6">
            
            <!-- Email -->
            <div class="space-y-1.5">
                <label for="email" class="block text-xs font-bold text-on-surface-variant uppercase tracking-widest ml-1">Email Address</label>
                <div class="relative group">
                    <span class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-on-surface-variant group-focus-within:text-primary transition-colors">mail</span>
                    <input type="email" id="email" required class="w-full bg-surface/50 border border-outline text-on-surface placeholder-on-surface-variant/30 rounded-2xl pl-12 pr-4 py-4 focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all font-medium" placeholder="you@example.com" />
                </div>
            </div>

            <!-- Password -->
            <div class="space-y-1.5">
                <label for="password" class="block text-xs font-bold text-on-surface-variant uppercase tracking-widest ml-1">Password</label>
                <div class="relative group">
                    <span class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-on-surface-variant group-focus-within:text-primary transition-colors">lock</span>
                    <input type="password" id="password" required class="w-full bg-surface/50 border border-outline text-on-surface placeholder-on-surface-variant/30 rounded-2xl pl-12 pr-4 py-4 focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all font-medium" placeholder="••••••••" />
                </div>
            </div>

            <div class="pt-4">
                <button type="submit" class="w-full py-4 px-4 bg-primary text-white hover:brightness-110 font-bold rounded-2xl transition-all duration-300 transform active:scale-[0.98] shadow-lg shadow-primary/20">
                    Sign In
                </button>
            </div>

        </form>

        <div class="mt-8 text-center">
            <p class="text-sm text-on-surface-variant font-medium">
                Don't have an account? 
                <a href="signup.html" class="text-primary hover:text-on-surface transition-colors font-bold ml-1">Sign up here</a>
            </p>
        </div>

    </div>

    <style>
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in-up {
            animation: fadeInUp 0.8s cubic-bezier(0.2, 1, 0.2, 1) forwards;
        }
    </style>
    <script src="./theme.js"></script>
</body>
</html>
